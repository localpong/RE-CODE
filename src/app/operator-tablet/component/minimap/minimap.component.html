<div class="minimap-container">
  <!-- Three.js Canvas -->
  <canvas #minimapCanvas style="display: block; width: 100%; height: 100%;"></canvas>
  
  <!-- เส้นสแกนเรดาร์ (CSS ธรรมดาซ้อนทับ 3D) -->
  <div class="radar-sweep" style="position: absolute; top: 50%; left: 50%; width: 200%; height: 200%; background: conic-gradient(from 0deg at 50% 50%, transparent 80%, rgba(0, 255, 255, 0.4) 100%); transform-origin: center; animation: sweep 3s linear infinite; mix-blend-mode: screen; pointer-events: none; z-index: 10; transform: translate(-50%, -50%) rotateX(60deg);"></div>
  
  <!-- Vignette ขอบดำเพิ่มบรรยากาศ -->
  <div style="position: absolute; top:0; left:0; width:100%; height:100%; box-shadow: inset 0 0 50px rgba(0,0,0,0.8); pointer-events: none;"></div>
</div>
